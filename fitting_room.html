<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>RefitMe-AI 更衣間</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/fitting_room.css">
</head>
<body>
     <!-- 導覽列 -->
     <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="assets/logo.jpg" class="logo-icon" alt="Logo" style="height: 70px; margin-right: 10px;">
          RefitMe
        </a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="fitting_room.html">AI 更衣間</a></li>
          <li class="nav-item"><a class="nav-link" href="recrew.html">Recrew</a></li>
          <li class="nav-item"><a class="nav-link" href="physical_store.html">實體店鋪</a></li>
          <li class="nav-item"><a class="nav-link" href="activity.html">活動</a></li>
          <li class="nav-item"><a class="nav-link" href="about_us.html">關於我們</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container py-5">
    <h1 class="text-center mb-4" style="color:#2f4f4f;font-family: 'Cormorant Garamond', serif;">AI 更衣間</h1>

    <div class="upload-box" id="uploadBox">
      <p>上傳最多 2 張衣物圖片，讓 AI 幫你試試看怎麼改造！</p>
      <input type="file" id="imageInput" accept="image/*" multiple class="form-control w-50 mx-auto">
      <div id="imagePreview" class="d-flex justify-content-center flex-wrap mt-3"></div>
      <p id="limitMsg" class="text-danger mt-2 d-none">最多只能上傳 2 張圖片。更多模擬請加購服務。</p>
    </div>

    <div class="text-center">
      <button class="btn custom-submit-btn" onclick="submitMockAI()">送出模擬</button>
    </div>

      
    <div id="resultArea" style="display:none;" class="text-center mt-4">
      <img id="resultImage" src="" alt="模擬結果" class="img-fluid mb-3" style="max-width: 300px;">
      <p id="resultText" style="font-weight:bold;"></p>
    </div>    
    <p id="regenerateInfo" class="mt-3 text-secondary" style="font-weight:bold;"></p>

    <div class="text-center">
      <a href="reform.html" class="custom-reform-btn " role="button">前往修改</a>
    </div>

  </div>

  <script src="js/fitting_room.js"></script>
</body>
</html>
